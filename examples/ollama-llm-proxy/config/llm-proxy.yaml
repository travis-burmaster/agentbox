# LLM Proxy config for AgentBox Docker deployment
# claude_proxy.py runs inside the container on :8319

primary_url: "http://127.0.0.1:8319/v1"
secondary_url: ""
strategy: "priority"
default_model: "claude-sonnet-4-6"
default_max_tokens: 8192
cooldown_seconds: 30

# Ollama facade port (must match supervisord.conf)
ollama_port: 11434

# Models advertised to OpenClaw via /api/tags
ollama_models:
  - name: "claude-sonnet-4-6"
    context_window: 200000
    max_tokens: 8192
  - name: "claude-haiku-4-5-20251001"
    context_window: 200000
    max_tokens: 4096
  - name: "claude-opus-4-6"
    context_window: 200000
    max_tokens: 8192
