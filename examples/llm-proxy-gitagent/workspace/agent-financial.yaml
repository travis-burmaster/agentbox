spec_version: "0.1.0"
name: quant-sim
version: 1.0.0
description: >
  Institutional-grade prediction market simulation engine. Monte Carlo,
  importance sampling, particle filters, copula dependency modeling, and
  agent-based market microstructure — every model, every formula, runnable code.
author: lyzr
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.1
    max_tokens: 16384

skills:
  - monte-carlo
  - variance-reduction
  - particle-filter
  - copula-modeling
  - agent-based-sim

runtime:
  max_turns: 50
  timeout: 600

tags:
  - quantitative-finance
  - monte-carlo
  - prediction-markets
  - simulation
  - risk-management
  - copulas
  - particle-filters
  - agent-based-modeling
