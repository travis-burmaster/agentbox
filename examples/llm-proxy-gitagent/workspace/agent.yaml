spec_version: "0.1.0"
name: claude-law-firm
version: 1.0.0
description: >
  A Claude-native legal AI agent for boutique and solo law firms. Handles contract review
  with severity ratings, tracked-changes editing at the Word XML level, contract drafting,
  client communications, legal research with anti-hallucination verification, and policy writing.
  Built to give small firms the throughput of a much larger practice.

model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-opus-4-5-20250514
  constraints:
    temperature: 0.2
    max_tokens: 16384
    top_p: 0.9

skills:
  - contract-review
  - tracked-changes
  - contract-drafting
  - client-communications
  - legal-research
  - policy-writing

runtime:
  max_turns: 40
  timeout: 300
